<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BFDBFE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#blueGradient)"/>
  
  <!-- 时光/流动元素 - 抽象的波浪线条 -->
  <path d="M25 55 Q35 45, 45 55 T65 55 T85 55" 
        stroke="white" stroke-width="3" fill="none" 
        stroke-linecap="round" opacity="0.9"/>
  <path d="M20 65 Q30 55, 40 65 T60 65 T80 65" 
        stroke="url(#lightBlue)" stroke-width="2.5" fill="none" 
        stroke-linecap="round" opacity="0.8"/>
  
  <!-- 心流/水滴元素 -->
  <path d="M50 25 
           Q60 35, 60 45 
           A10 10 0 0 1 40 45 
           Q40 35, 50 25 Z" 
        fill="white" opacity="0.95"/>
  
  <!-- 中心光点 -->
  <circle cx="50" cy="42" r="4" fill="url(#blueGradient)" opacity="0.6"/>
</svg>
